<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Escove o Gato 🐱</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #222;
            color: white;
            font-family: Arial, sans-serif;
            user-select: none;
        }

        #topbar {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }

        .catBtn {
            padding: 8px 12px;
            border: none;
            cursor: pointer;
            background: #444;
            color: white;
            border-radius: 8px;
            border: 1px solid pink;
        }

        .catBtn:hover {
            background: #666;
            transform: scale(1.1);
        }

        #game {
            position: relative;
            width: 100vw;
            height: 100vh;
            cursor: none;
        }

        #game {
            transition: filter 0.3s;
        }

        #game.bravoBg {
            filter: brightness(0.7) contrast(1.2);
        }

        #gato {
            position: absolute;
            width: 300px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        #mao {
            position: absolute;
            width: 60px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .pelo {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ccc;
            border-radius: 50%;
            animation: cair 1s linear forwards;
        }

        @keyframes cair {
            to {
                transform: translateY(50px);
                opacity: 0;
            }
        }

        #score {
            top: 10px;
            right: 5px;
            font-size: 24px;
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        #gameover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 40px;
            z-index: 999;
        }

        #gameover div {
            font-size: 24px;
            margin-top: 10px;
        }

        #restart {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 20px;
            cursor: pointer;
        }

        #menu {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 1000;
            cursor: default;
        }

        #menu h1 {
            font-size: 40px;
            padding: 0px;
            margin-top: 0px;

        }

        #catSelect {
            display: flex;
            gap: 20px;
        }

        .catCard {
            background: #ffffff;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            width: 120px;
            color: black;
        }

        .catCard:hover {
            background: #fcf3f3;
        }

        .catCard.selected {
            border: 3px dotted pink;
        }

        button,
        .catCard {
            cursor: pointer;
        }

        #menu button {
            color: pink;
            background-color: white;
            border: none;
            padding: 10px;
            width: 180px;
            font-size: 19px;
            border-radius: 12px;
        }

        .btn {
            color: pink;
            background-color: white;
            border: none;
            padding: 12px;
            width: 180px;
            font-size: 19px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: #ffeaea;
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .gameoverCard {
            background: #111;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        #gifsLayer {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            /* fundo */
            overflow: hidden;
        }

        #gifsLayer img {
            position: absolute;
            width: 70px;
            opacity: 0.5;
            pointer-events: none;
            animation: flutuar 3s ease-in-out infinite;
        }

        /* conteúdo do menu na frente */
        #menu>*:not(#gifsLayer) {
            position: relative;
            z-index: 2;
        }

        @keyframes flutuar {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }

            100% {
                transform: translateY(0);
            }
        }

        #topUI {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 5;
        }

        /* botão menor */
        .btn.small {
            width: 45px;
            padding: 8px;
            font-size: 18px;
            border: none;
            cursor: pointer;
            background: #444;
            color: white;
            border-radius: 8px;
            border: 1px solid pink;
        }

        .btn.small:hover {
            background: #666;
            transform: scale(1.1);
        }

        #gato.bravoAnim {
            animation: zoomBravo 0.6s ease forwards;
        }

        @keyframes zoomBravo {
            0% {
                transform: translate(-50%, -50%) scale(1);
            }

            100% {
                transform: translate(-50%, -50%) scale(1.5);
            }
        }
    </style>
</head>

<body>


    <div id="topbar">
        <button class="catBtn" onclick="trocarGato('clarinha')">🐱 Clarinha</button>
        <button class="catBtn" onclick="trocarGato('theo')">😼 Theo</button>
        <button class="catBtn" onclick="trocarGato('francisco')">🐾 Francisco</button>
    </div>

    <div id="menu">
        <div id="gifsLayer"></div>
        <img src="imgs/lalacGato.png" alt="">
        <h1>Escove o Gato</h1>

        <div id="catSelect"></div>

        <button id="playBtn">▶ Jogar</button>
    </div>

    <div id="game">
        <div id="topUI">
            <div id="score">⭐ 0</div>
            <button id="menuGameBtn" class="btn small">🏠</button>
        </div>

        <img id="gato" draggable="false">
        <img id="mao" src="imgs/mao_aberta.png">
    </div>

    <div id="gameover">
        <div class="gameoverCard">
            <h1>GAME OVER 😾</h1>
            <div id="finalScore"></div>
            <div id="highScore"></div>

            <button id="restart" class="btn">🔄 Reiniciar</button>
            <button id="menuBtn" class="btn">🏠 Menu</button>
        </div>
    </div>
    <script>
        const gato = document.getElementById("gato");
        const mao = document.getElementById("mao");
        const scoreEl = document.getElementById("score");
        const gameoverEl = document.getElementById("gameover");
        const restartBtn = document.getElementById("restart");
        const finalScoreEl = document.getElementById("finalScore");
        const highScoreEl = document.getElementById("highScore");


        const gatos = {
            clarinha: {
                costas: "imgs/gato_laranja_costas-removebg-preview.png",
                virado: "imgs/gato_laranja_virado-removebg-preview.png",
                bravo: "imgs/gato_laranja_bravo-removebg-preview.png",
                icon: "🌸"
            },
            theo: {
                costas: "imgs/gato_preto_costas-removebg-preview.png",
                virado: "imgs/gato_preto_virado_-removebg-preview.png",
                bravo: "imgs/gato_preto_bravo-removebg-preview.png",
                icon: "😼"
            },
            francisco: {
                costas: "imgs/gato_cinza_costas-removebg-preview.png",
                virado: "imgs/gato_cinza_virado-removebg-preview.png",
                bravo: "imgs/gato_cinza_bravo-removebg-preview.png",
                icon: "🐾"
            }
        };

        const menu = document.getElementById("menu");
        const catSelect = document.getElementById("catSelect");
        const playBtn = document.getElementById("playBtn");

        let gatoSelecionado = "clarinha";
        let gatoAtual = "clarinha";
        let score, escovando, olhando, chance, acabou;
        let ultimoPonto = 0;
        const intervaloPontos = 80;



        /* preload imagens */
        function preloadImagens() {
            Object.values(gatos).forEach(g => {
                Object.values(g).forEach(src => {
                    if (typeof src === "string") {
                        const img = new Image();
                        img.src = src;
                    }
                });
            });
        }

        function criarMenu() {
            catSelect.innerHTML = "";

            Object.keys(gatos).forEach(nome => {
                const card = document.createElement("div");
                card.classList.add("catCard");

                const recorde = localStorage.getItem(`recorde_${nome}`) || 0;

                card.innerHTML = `
            <h3>${gatos[nome].icon}</h3>
            <p>${nome}</p>
            <small>Recorde: ${recorde}</small>
        `;

                if (nome === gatoSelecionado) {
                    card.classList.add("selected");
                }

                card.onclick = () => {
                    gatoSelecionado = nome;
                    criarMenu();
                };

                catSelect.appendChild(card);
            });
        }

        document.getElementById("game").classList.add("bravoBg");

        const menuBtn = document.getElementById("menuBtn");

        menuBtn.addEventListener("click", () => {
            gameoverEl.style.display = "none";
            menu.style.display = "flex";
            criarMenu();
        });

        function trocarGato(nome) {
            gatoAtual = nome;
            resetJogo();
        }

        function resetJogo() {
            score = 0;
            escovando = false;
            olhando = false;
            chance = 0;
            acabou = false;
            ultimoPonto = 0;

            gato.src = gatos[gatoAtual].costas;
            scoreEl.textContent = `${gatos[gatoAtual].icon} 0`;
            gameoverEl.style.display = "none";

            mao.style.opacity = 1;
            mao.src = "imgs/mao_aberta.png";
        }

        function iniciarJogo() {
            preloadImagens();
            resetJogo();
        }

        preloadImagens();
        criarMenu();
        menu.style.display = "flex";

        document.addEventListener("mousemove", (e) => {
            mao.style.left = (e.clientX - 25) + "px";
            mao.style.top = (e.clientY - 25) + "px";

            if (acabou || !escovando) return;

            const gatoRect = gato.getBoundingClientRect();

            if (
                e.clientX > gatoRect.left &&
                e.clientX < gatoRect.right &&
                e.clientY > gatoRect.top &&
                e.clientY < gatoRect.bottom
            ) {
                const agora = Date.now();

                if (agora - ultimoPonto > intervaloPontos) {
                    score++;
                    scoreEl.textContent = `${gatos[gatoAtual].icon} ${score}`;
                    ultimoPonto = agora;

                    criarPelo(e.clientX, e.clientY);
                    chance += 0.002;

                    if (!olhando && Math.random() < chance) {
                        gatoOlha();
                    }
                }
            }
        });

        playBtn.addEventListener("click", () => {
            gatoAtual = gatoSelecionado;
            menu.style.display = "none";
            iniciarJogo();


            setTimeout(() => {
                mao.style.opacity = 1;
            }, 100);
        });

        menuBtn.addEventListener("click", () => {
            gameoverEl.style.display = "none";
            menu.style.display = "flex";
            criarMenu();

            mao.style.opacity = 0;
        });

        document.addEventListener("mousedown", () => {
            if (!acabou) {
                escovando = true;
                mao.src = "imgs/mao_fechada.png";
            }
        });

        document.addEventListener("mouseup", () => {
            escovando = false;
            mao.src = "imgs/mao_aberta.png";
        });

        function gameOver() {
            acabou = true;
            escovando = false;

            mao.style.opacity = 0;

            let recorde = localStorage.getItem(getRecordeKey()) || 0;

            if (score > recorde) {
                recorde = score;
                localStorage.setItem(getRecordeKey(), recorde);
            }

            finalScoreEl.textContent = `${gatos[gatoAtual].icon} Sua pontuação: ${score}`;
            highScoreEl.textContent = `${gatos[gatoAtual].icon} Recorde: ${recorde}`;

            gameoverEl.style.display = "flex";
        }

        function criarPelo(x, y) {
            const pelo = document.createElement("div");
            pelo.classList.add("pelo");
            pelo.style.left = x + "px";
            pelo.style.top = y + "px";

            document.body.appendChild(pelo);
            setTimeout(() => pelo.remove(), 1000);
        }

        function gatoOlha() {
            olhando = true;
            gato.src = gatos[gatoAtual].virado;

            setTimeout(() => {
                if (escovando) {
                    gato.src = gatos[gatoAtual].bravo;

                    // 🔥 trava o jogo
                    acabou = true;
                    escovando = false;

                    // adiciona animação
                    gato.classList.add("bravoAnim");

                    // espera animação terminar
                    setTimeout(() => {
                        gameOver();

                        // limpa animação pra próxima rodada
                        gato.classList.remove("bravoAnim");
                        gato.style.transform = "translate(-50%, -50%) scale(1)";
                    }, 600);

                } else {
                    olhando = false;
                    gato.src = gatos[gatoAtual].costas;
                    chance *= 0.5;
                }
            }, 700);
        }

        function getRecordeKey() {
            return `recorde_${gatoAtual}`;
        }

        const menuGameBtn = document.getElementById("menuGameBtn");

        menuGameBtn.addEventListener("click", () => {
            // para o jogo
            acabou = true;
            escovando = false;

            // esconde mão
            mao.style.opacity = 0;

            // esconde game over se estiver aberto
            gameoverEl.style.display = "none";

            // mostra menu
            menu.style.display = "flex";
            criarMenu();
        });

        function spawnGatinhos() {
            const layer = document.getElementById("gifsLayer");
            layer.innerHTML = "";

            const gifs = [
                "imgs/gatogif1.gif",
                "imgs/gatogif2.gif",
                "imgs/gatogif3.gif",
                "imgs/gatogif4.gif",
                "imgs/gatogif5.gif",
                "imgs/gatogif6.gif",
                "imgs/gatogif7.gif",
                "imgs/gatogif8.gif",
                "imgs/gatogif9.gif"
            ];

            for (let i = 0; i < 10; i++) {
                const img = document.createElement("img");

                // escolhe um gif aleatório
                img.src = gifs[Math.floor(Math.random() * gifs.length)];

                let x, y;
                do {
                    x = Math.random() * 100;
                    y = Math.random() * 100;
                } while (
                    x > 20 && x < 80 &&
                    y > 20 && y < 80
                );

                img.style.left = x + "%";
                img.style.top = y + "%";

                /* extras visuais */
                img.style.width = (50 + Math.random() * 40) + "px";
                img.style.animationDuration = (2 + Math.random() * 3) + "s";

                layer.appendChild(img);
            }
        }

        const safeZone = 30; // % do centro

        let x, y;
        do {
            x = Math.random() * 100;
            y = Math.random() * 100;
        } while (x > 50 - safeZone && x < 50 + safeZone &&
        y > 50 - safeZone && y < 50 + safeZone);

        spawnGatinhos();

        restartBtn.addEventListener("click", () => {
            iniciarJogo();

            mao.style.opacity = 1;
        });
    </script>

</body>

</html>
